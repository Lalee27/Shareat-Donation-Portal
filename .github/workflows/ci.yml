name: Shareat CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  client-ci:
    name: Client CI (Build & Validate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: npm ci
        working-directory: ./client

      - name: Build Client
        run: npm run build
        working-directory: ./client

  server-ci:
    name: Server CI (Validate & Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: npm ci
        working-directory: ./server

      - name: Validate Server Entrypoint
        run: node -c index.js
        working-directory: ./server
