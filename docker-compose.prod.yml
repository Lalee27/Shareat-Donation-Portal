services:
  server:
    build:
      context: ./server
    container_name: shareat-server-prod
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/donation-platform
      - JWT_SECRET=donation_platform_jwt_secret_key_2026
      - NODE_ENV=production
      # Add GEMINI_API_KEY, EMAIL_USER, EMAIL_PASS, etc., in your deployment environment or .env file
    depends_on:
      - mongo
    restart: always

  client:
    build:
      context: ./client
      target: production
    container_name: shareat-client-prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

  mongo:
    image: mongo:7.0
    container_name: shareat-mongo-prod
    volumes:
      - mongo-prod-data:/data/db
    restart: always

volumes:
  mongo-prod-data:
